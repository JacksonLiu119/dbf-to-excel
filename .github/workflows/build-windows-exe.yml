name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r offline/requirements.txt pyinstaller

      - name: Build executables
        run: |
          pyinstaller --onefile --name dbf-to-excel offline/dbf_to_excel.py
          pyinstaller --onefile --windowed --name 轉換程式 offline/dbf_to_excel_gui.py

      - name: Prepare portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package\input | Out-Null
          New-Item -ItemType Directory -Force package\output | Out-Null
          Copy-Item dist\dbf-to-excel.exe package\dbf-to-excel.exe
          Copy-Item dist\轉換程式.exe package\轉換程式.exe
          Copy-Item portable\convert.bat package\convert.bat
          Copy-Item portable\README.txt package\README.txt
          Compress-Archive -Path package\* -DestinationPath dbf-to-excel-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbf-to-excel-windows
          path: dbf-to-excel-windows.zip
